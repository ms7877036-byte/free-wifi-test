<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Connect System</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Arial', sans-serif;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 3px solid #ff4757;
            max-width: 350px;
        }
        .status-header {
            color: #2ed573;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 30px;
            display: block;
        }
        .main-text {
            color: #ff4757;
            font-size: 32px;
            font-weight: 900;
            margin: 20px 0;
            line-height: 1.4;
        }
        .sub-text {
            color: #747d8c;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="status-header">📶 تم الاتصال بنجاح.. جاري تحميل البيانات</span>
        
        <div class="main-text">
            شوف حد ينيكك
        </div>

        <p class="sub-text">
            عذراً، يبدو أنك حاولت سرقة شبكة لا تخصك.
            <br>
            يرجى المحاولة مرة أخرى في وقت لاحق.
        </p>
    </div>
</body>
</html>
