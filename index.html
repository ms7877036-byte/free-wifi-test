
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Network System</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e9ecef;
            font-family: 'Arial', sans-serif;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 2px solid #007bff;
            max-width: 320px;
        }
        .wifi-icon {
            color: #007bff;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .anime-box {
            margin: 20px auto;
            width: 150px;
            height: 150px;
        }
        h1 {
            color: #dc3545;
            font-size: 22px;
            margin: 15px 0;
        }
        p {
            color: #495057;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wifi-icon">📶 Connected to Free_WiFi_HighSpeed</div>
        <div class="anime-box">
            <!-- رسم SVG لأنمي حمار مبسط مع الحركة المطلوبة -->
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- الأذنين -->
                <ellipse cx="35" cy="20" rx="5" ry="15" fill="#808080" transform="rotate(-15 35 20)"/>
                <ellipse cx="65" cy="20" rx="5" ry="15" fill="#808080" transform="rotate(15 65 20)"/>
                <!-- الرأس -->
                <ellipse cx="50" cy="45" rx="25" ry="22" fill="#808080"/>
                <!-- العينين (ستايل أنمي) -->
                <circle cx="40" cy="40" r="3" fill="white"/>
                <circle cx="60" cy="40" r="3" fill="white"/>
                <circle cx="40" cy="40" r="1.5" fill="black"/>
                <circle cx="60" cy="40" r="1.5" fill="black"/>
                <!-- الفم/الخطم -->
                <ellipse cx="50" cy="55" rx="12" ry="8" fill="#c0c0c0"/>
                <!-- الحركة المطلوبة (اليد والأصبع) -->
                <rect x="47" y="65" width="6" height="25" rx="3" fill="#808080"/> <!-- اليد -->
                <rect x="48" y="58" width="4" height="15" rx="2" fill="#808080"/> <!-- الأصبع الأوسط -->
                <path d="M45 70 Q50 72 55 70" fill="none" stroke="#000" stroke-width="1"/>
            </svg>
        </div>
        <h1>يا حمار!</h1>
        <p>لا يوجد إنترنت مجاني هنا.. <br> ابحث عن عمل أو ادرس بدلاً من محاولة سرقة الواي فاي!</p>
        <div style="margin-top:20px; font-size: 10px; color: #adb5bd;">Error Code: 404_BRAIN_NOT_FOUND</div>
    </div>
</body>
</html>
